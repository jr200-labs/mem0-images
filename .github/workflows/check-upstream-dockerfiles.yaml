name: check-upstream-dockerfiles

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-upstream-dockerfiles:
    runs-on: ${{ fromJSON(vars.RUNNER_PROFILES)[vars.RUNNER_PROFILE].default }}
    steps:
      - uses: actions/checkout@v6
      - name: Verify Dockerfiles match upstream mem0
        run: ./scripts/check-upstream-dockerfiles.sh
